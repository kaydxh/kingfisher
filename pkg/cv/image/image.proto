syntax = "proto3";

package kingfisher.kcv;

// import "google/protobuf/duration.proto";

enum ColorSpace {
  UnknownColorSpace = 0;
  BGRColorSpace = 1;
  BGRAColorSpace = 2;
  GRAYColorSpace = 3;
  GRAYAColorSpace = 4;
  RGBColorSpace = 5;
  RGBAColorSpace = 6;
}

message DecodeOptions {
  ColorSpace targetColorSpace = 1;
  bool auto_orient = 2;
}

message EncodeOptions {
  string format = 1;      // 编码格式: "jpeg", "png", "webp", "bmp"
  int32 quality = 2;      // JPEG/WebP 质量 (0-100)
  int32 compression = 3;  // PNG 压缩级别 (0-9)
}

message Point {
  int32 x = 1;
  int32 y = 2;
}

message Size {
  int32 width = 1;
  int32 height = 2;
}

enum FlipMode {
  FLIP_VERTICAL = 0;    // 垂直翻转（沿X轴）
  FLIP_HORIZONTAL = 1;  // 水平翻转（沿Y轴）
  FLIP_BOTH = 2;        // 同时翻转（沿两轴）
}

message AnnotateOptions {
  string font = 1;          // 字体路径或名称
  double font_size = 2;     // 字体大小
  int32 color_r = 3;        // 文字颜色 R 分量 (0-255)
  int32 color_g = 4;        // 文字颜色 G 分量 (0-255)
  int32 color_b = 5;        // 文字颜色 B 分量 (0-255)
  int32 thickness = 6;      // 文字线条粗细（默认1）
  bool anti_alias = 7;      // 是否开启抗锯齿
}

// ==================== 进阶功能 Proto 定义 ====================

// 模糊类型
enum BlurType {
  BLUR_GAUSSIAN = 0;   // 高斯模糊
  BLUR_MEAN = 1;       // 均值模糊
  BLUR_MEDIAN = 2;     // 中值模糊
  BLUR_BILATERAL = 3;  // 双边滤波（保边平滑）
}

// 滤镜选项
message FilterOptions {
  // 模糊参数
  BlurType blur_type = 1;         // 模糊类型
  int32 kernel_size = 2;          // 核大小（必须为奇数，默认5）
  double sigma = 3;               // 高斯模糊 sigma 值（默认0，自动计算）
  double sigma_color = 4;         // 双边滤波颜色 sigma
  double sigma_space = 5;         // 双边滤波空间 sigma

  // 亮度/对比度参数
  double brightness = 10;         // 亮度偏移 [-255, 255]（默认0）
  double contrast = 11;           // 对比度系数 [0.0, 3.0]（默认1.0）

  // 锐化参数
  double sharpen_amount = 20;     // 锐化强度（默认1.0）
  int32 sharpen_kernel_size = 21; // 锐化核大小（默认3）
}

// 图像哈希类型
enum HashType {
  HASH_AVERAGE = 0;       // 平均哈希（aHash）
  HASH_PERCEPTUAL = 1;    // 感知哈希（pHash）
  HASH_DIFFERENCE = 2;    // 差异哈希（dHash）
}

// 直方图比较方法
enum CompareMethod {
  COMPARE_CORRELATION = 0;      // 相关性
  COMPARE_CHI_SQUARE = 1;       // 卡方
  COMPARE_INTERSECTION = 2;     // 交集
  COMPARE_BHATTACHARYYA = 3;    // 巴氏距离
}

// 图像相似度结果
message SimilarityResult {
  double score = 1;               // 相似度得分
  string method = 2;              // 使用的方法名称
}

// EXIF 信息
message ExifInfo {
  // 基本信息（已有的 ImageInfo 字段补充）
  string camera_make = 1;         // 相机制造商
  string camera_model = 2;        // 相机型号
  string datetime = 3;            // 拍摄时间
  double exposure_time = 4;       // 曝光时间（秒）
  double f_number = 5;            // 光圈值
  int32 iso_speed = 6;            // ISO 感光度
  double focal_length = 7;        // 焦距（mm）
  double gps_latitude = 8;        // GPS 纬度
  double gps_longitude = 9;       // GPS 经度
  double gps_altitude = 10;       // GPS 海拔
  int32 image_width = 11;         // 图像宽度
  int32 image_height = 12;        // 图像高度
  OrientationType orientation = 13;  // 方向
  string software = 14;           // 软件
  string description = 15;        // 描述
  string copyright = 16;          // 版权
}

message Rect {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
}

enum OrientationType {
  UndefinedOrientation = 0;   /*      0      / Unknown  / Unknown  */
  TopLeftOrientation = 1;     /*      1      / Left     / Top      */
  TopRightOrientation = 2;    /*      2      / Right    / Top      */
  BottomRightOrientation = 3; /*      3      / Right    / Bottom   */
  BottomLeftOrientation = 4;  /*      4      / Left     / Bottom   */
  LeftTopOrientation = 5;     /*      5      / Top      / Left     */
  RightTopOrientation = 6;    /*      6      / Top      / Right    */
  RightBottomOrientation = 7; /*      7      / Bottom   / Right    */
  LeftBottomOrientation = 8;  /*      8      / Bottom   / Left     */
};

enum ImageType {
  UndefinedType = 0;
  BilevelType = 1;
  GrayscaleType = 2;
  GrayscaleMatteType = 3;
  PaletteType = 4;
  PaletteMatteType = 5;
  TrueColorType = 6;
  TrueColorMatteType = 7;
  ColorSeparationType = 8;
  ColorSeparationMatteType = 9;
}

// https://github.com/trevor/ImageMagick/blob/82d683349c7a6adc977f6f638f1b340e01bf0ea9/branches/ImageMagick-6.6.3/Magick%2B%2B/lib/Magick%2B%2B/Image.h#L936
message ImageInfo {
  int64 rows = 2;
  int64 columns = 3;
  ColorSpace color_space = 4;
  int64 depth = 5;
  string directory = 6;
  string file_name = 7;
  int64 file_size = 8;  // Number of bytes of the image on disk
  string format = 9;    // Long image format description
  double gama = 10;     // Gamma level of the image
  bool is_valid = 11;   // Does object contain valid image?
  string label = 12;    // Image label
  double line_width =
      13;             // Stroke width for drawing vector objects (default one)
  bytes magick = 14;  // File type magick identifier (.e.g "GIF")
  bool matte = 15;    // Image supports transparency (matte channel)
  OrientationType orientation = 16;  // Image orientation
  int64 quality = 17;          // JPEG/MIFF/PNG compression level (default 75).
  int64 quantize_colors = 18;  // Colorspace to quantize in.
  string tile_name = 19;       // Tile name
  ImageType type = 20;  // Image representation type (also see type operation)
  string magick_warning = 21;  // Magick::Warning ignored
}